packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@hono/node-server": ^1.19.14
  "@tanstack/react-query": ^5.100.5
  "@tanstack/react-router": ^1.168.25
  "@types/node": ^24
  "@unocss/reset": ^66.6.8
  "@vitejs/plugin-react": ^4.7.0
  better-sqlite3: ^11.10.0
  drizzle-orm: ^0.44.7
  hono: ^4.12.15
  react: ^19.2.5
  react-dom: ^19.2.5
  typescript: ^5
  unocss: ^66.6.8
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
onlyBuiltDependencies:
  - better-sqlite3
  - esbuild
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
